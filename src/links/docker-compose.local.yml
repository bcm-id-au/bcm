name: bcm-links

services:

  bcm-links-web:
    container_name: bcm-links-web
    image: ghcr.io/karakeep-app/karakeep:release
    restart: no
    volumes:
      - "${STORAGE_DIR_APP}:/data"
    ports:
      - 3000:3000
    env_file:
      - .links.env
    environment:
      MEILI_ADDR: http://bcm-links-search:7700
      BROWSER_WEB_URL: http://bcm-links-browser:9222
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      DATA_DIR: /data

  bcm-links-browser:
    container_name: bcm-links-browser
    image: gcr.io/zenika-hub/alpine-chrome:124
    restart: no
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  bcm-links-search:
    container_name: bcm-links-search
    image: getmeili/meilisearch:v1.41.0
    restart: no
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"
    volumes:
      - "${STORAGE_DIR_SEARCH}:/meili_data"
