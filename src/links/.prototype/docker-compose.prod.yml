name: "${SERVICE}"

services:

  bcm-links-web:
    image: ghcr.io/karakeep-app/karakeep:release
    ports:
      - "3000:3000"
    depends_on:
      - bcm-links-browser
      - bcm-links-search
    volumes:
      - bcm-links-app-data:/data
    environment:
      MEILI_ADDR: http://bcm-links-search:7700
      BROWSER_WEB_URL: http://bcm-links-browser:9222
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      DATA_DIR: /data
    x-google-cloudrun:ingress-container: true

  bcm-links-browser:
    image: gcr.io/zenika-hub/alpine-chrome:124
    expose:
      - "9222"
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  bcm-links-search:
    image: getmeili/meilisearch:v1.41.0
    expose:
      - "7700"
    volumes:
      - bcm-links-search-data:/meili_data
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"

volumes:
  bcm-links-app-data:
  bcm-links-search-data:
