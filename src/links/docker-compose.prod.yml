name: "${SERVICE}"

services:
  bcm-links-web:
    image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE}-web:${IMAGE_TAG}"
    ports:
      - "3000:3000"
    depends_on:
      - bcm-links-browser
      - bcm-links-search
    volumes:
      - bcm-links-app-data:/data
    environment:
      DATA_DIR: /data
      MEILI_ADDR: http://bcm-links-search:7700
      BROWSER_WEB_URL: http://bcm-links-browser:9222
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      INFERENCE_TEXT_MODEL: "${INFERENCE_TEXT_MODEL:-gpt-4.1-mini}"
      INFERENCE_IMAGE_MODEL: "${INFERENCE_IMAGE_MODEL:-gpt-4o-mini}"
      DISABLE_SIGNUPS: "${DISABLE_SIGNUPS:-true}"
      KARAKEEP_DISABLE_SIGNUPS: "${KARAKEEP_DISABLE_SIGNUPS:-true}"
    x-google-cloudrun:ingress-container: true

  bcm-links-browser:
    image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE}-browser:${IMAGE_TAG}"
    expose:
      - "9222"
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  bcm-links-search:
    image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE}-search:${IMAGE_TAG}"
    expose:
      - "7700"
    volumes:
      - bcm-links-search-data:/meili_data
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"

volumes:
  bcm-links-app-data:
  bcm-links-search-data: