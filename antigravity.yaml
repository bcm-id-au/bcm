#
#
# Google Antigravity configuration for this repository
#
#

# The primary AI model to be used by the agent
model: gemini-3.5-flash

# Run commands and operations in a secure local Linux sandbox
sandbox: true

# Require user review and explicit approval for all proposed commands and changes
auto_approve: false

# Verification command to ensure shell scripts are syntactically valid
test_command: "bash -n setup.sh"

# Explicitly disabled/blocked terminal commands for the agent in this workspace
blocked_commands:
  - "git commit"
  - "git push"
