#
#
# Manual Workflow: Site - Release and Deploy
#   - This workflow includes the test, release and deployment process for the site.
#   - Initial setup steps and documentation in: 'src/site/.infra/README.md'
#   - Requires GitHub Repository Secrets setup in Repo > Settings > Secrets > Actions.
#
#

name: Site - Deploy
run-name: Deploy Site by ${{ github.actor }} on ${{ github.ref_name }}

on:
  # Allow manual triggers via GitHub Repo > Actions
  workflow_dispatch:
    inputs:
      continue_deployment:
        description: 'Confirm production deployment for Public Website'
        type: boolean
        required: true
        default: false

defaults:
  run:
    working-directory: ./src/site
    shell: bash

permissions:
  contents: read

jobs:

  build:
    name: Build
    if: ${{ inputs.continue_deployment == true }}
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.artifact.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set build artifact name
        id: artifact
        run: echo "artifact_name=build-$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Site setup
        run: deno task setup
      - name: Load secrets in to environment
        run: echo '?' # TODO: load all github secrets in to the env so the next step has what it needs
      - name: Build site
        run: deno task build
      - name: Upload build files
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          overwrite: true
          include-hidden-files: true
          retention-days: 1
          compression-level: 9
          path: |
            src/site/public
            src/site/.env
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ci-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download build files
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./src/site
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Run tests
        working-directory: ./src/site
        run: deno task test

  publish-github-packages:
    name: Publish to GitHub Packages
    needs: [build, test]
    runs-on: ubuntu-latest
    environment:
      name: github-packages
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Log in to GitHub Packages
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get commit details
        id: commit
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ${{ github.workspace }}/src/site
          file: ${{ github.workspace }}/src/site/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-site:latest
            ghcr.io/${{ github.repository }}-site:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-site:${{ steps.commit.outputs.sha_short }}

  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: [build, test]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download build files
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./src/site
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./src/site/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    name: Release
    needs: [deploy-github-pages, publish-github-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate release details
        id: release
        run: |
          DATE_RELEASE=$(TZ='Australia/Sydney' date +%Y%m%d.%H%M)
          echo "name=$DATE_RELEASE" >> $GITHUB_OUTPUT
          echo "tag=release-$DATE_RELEASE" >> $GITHUB_OUTPUT
      - name: Create release tag
        run: |
          git config user.name "bot-release"
          git config user.email "brendan+bot-release@murty.au"
          git tag ${{ steps.release.outputs.tag }}
          git push --tags --quiet
      - name: Generate release notes
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x ./bin/release-notes.sh
          bash ./bin/release-notes.sh ${{ github.workspace }}/release-notes.log
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ steps.release.outputs.name }}
          tag: ${{ steps.release.outputs.tag }}
          bodyFile: ${{ github.workspace }}/release-notes.log
          makeLatest: true
