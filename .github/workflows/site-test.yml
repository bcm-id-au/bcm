#
#
# GitHub Actions Workflow: Site Test
#   - This workflow includes the build and test processes
#
#

name: Site Test
run-name: Site Test by ${{ github.actor }} on ${{ github.ref_name }}

on:
  # Allow manual triggers via GitHub Repo > Actions
  workflow_dispatch:
  # Automatically run on PRs that are targetting certain branches
  pull_request:
    branches:
      - develop
      - main

defaults:
  run:
    working-directory: src/site
    shell: bash

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment:
      name: ci-build
      deployment: false
    env: ${{ secrets }}
    outputs:
      artifact_name: ${{ steps.artifact.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set build artifact name
        id: artifact
        run: echo "artifact_name=build-$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Site setup
        run: deno task setup
      - name: Build site
        run: deno task build
      - name: Upload build files
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          overwrite: true
          include-hidden-files: true
          retention-days: 1
          compression-level: 9
          path: |
            src/site/public
            src/site/.env
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ci-build
      deployment: false
    env: ${{ secrets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download build files
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ github.workspace }}/src/site
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Run tests
        run: deno task test