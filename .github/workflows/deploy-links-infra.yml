#
#
# Manual Workflow: Links - Deploy GCP Infrastructure
#   - Creates/updates the infrastructure required by '.github/workflows/deploy-links.yml'.
#   - Initial setup steps and documentation in: 'src/links/.infra/README.md'
#   - Requires a bootstrap GCP credentials JSON secret with permission to manage these resources.
#
#

name: 'Links - Deploy GCP Infrastructure'

'on':
  workflow_dispatch:

env:
  PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
  REGION: 'asia-southeast1'
  ARTIFACT_REPOSITORY: '${{ secrets.LINKS_GCP_ARTIFACT_REPOSITORY }}'
  CLOUD_RUN_SERVICE: '${{ secrets.GCP_CLOUD_RUN_SERVICE_PREFIX }}'
  GITHUB_REPOSITORY_FULL: '${{ github.repository }}'
  WORKLOAD_POOL: '${{ secrets.LINKS_GCP_WORKLOAD_POOL }}'
  WORKLOAD_PROVIDER: '${{ secrets.LINKS_GCP_WORKLOAD_PROVIDER_NAME }}'
  SERVICE_ACCOUNT_INPUT: '${{ secrets.LINKS_GCP_SERVICE_ACCOUNT }}'
  LINKS_DOMAIN: '${{ secrets.LINKS_DOMAIN }}'
  GCP_DNS_ZONE: '${{ secrets.LINKS_GCP_DNS_ZONE }}'
  GCP_DNS_NAME: '${{ secrets.LINKS_GCP_DNS_NAME }}'

jobs:
  deploy-gcp-infra:
    name: 'Deploy Infrastructure'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
      - name: 'Validate bootstrap credentials'
        shell: 'bash'
        env:
          BOOTSTRAP_CREDENTIALS_JSON: '${{ secrets.LINKS_GCP_INFRA_CREDENTIALS_JSON }}'
        run: |-
          set -euo pipefail

          if [[ -z "${BOOTSTRAP_CREDENTIALS_JSON:-}" ]]; then
            echo "Missing required secret: LINKS_GCP_INFRA_CREDENTIALS_JSON" >&2
            exit 1
          fi
      - name: 'Authenticate to GCP'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.LINKS_GCP_INFRA_CREDENTIALS_JSON }}'
          project_id: '${{ env.PROJECT_ID }}'
      - name: 'Set up GCP'
        uses: 'google-github-actions/setup-gcloud@v2'
      - name: 'Deploy Infrastructure'
        shell: 'bash'
        run: |-
          set -euo pipefail

          if [[ -z "${PROJECT_ID:-}" ]]; then
            echo "Missing required secret: GCP_PROJECT_ID" >&2
            exit 1
          fi

          if [[ -z "${ARTIFACT_REPOSITORY:-}" ]]; then
            echo "Missing required secret: LINKS_GCP_ARTIFACT_REPOSITORY" >&2
            exit 1
          fi

          if [[ -z "${CLOUD_RUN_SERVICE:-}" ]]; then
            echo "Missing required secret: GCP_CLOUD_RUN_SERVICE_PREFIX" >&2
            exit 1
          fi

          if [[ "${GITHUB_REPOSITORY_FULL}" != */* ]]; then
            echo "GITHUB_REPOSITORY_FULL must use owner/repo format" >&2
            exit 1
          fi

          if [[ -n "${LINKS_DOMAIN:-}" && -z "${GCP_DNS_ZONE:-}" ]]; then
            echo "Missing required secret for LINKS_DOMAIN: LINKS_GCP_DNS_ZONE" >&2
            exit 1
          fi

          if [[ -n "${LINKS_DOMAIN:-}" && -z "${GCP_DNS_NAME:-}" ]]; then
            echo "Missing required secret for LINKS_DOMAIN: LINKS_GCP_DNS_NAME" >&2
            exit 1
          fi

          project_id="${PROJECT_ID}"
          region="${REGION}"
          artifact_repository="${ARTIFACT_REPOSITORY}"
          cloud_run_service="${CLOUD_RUN_SERVICE}"
          github_repository="${GITHUB_REPOSITORY_FULL}"
          workload_pool="${WORKLOAD_POOL:-bcm-links-github}"
          workload_provider="${WORKLOAD_PROVIDER:-github}"
          service_account_input="${SERVICE_ACCOUNT_INPUT:-${cloud_run_service}-deployer}"
          links_domain="${LINKS_DOMAIN:-}"
          dns_zone="${GCP_DNS_ZONE:-}"
          dns_name="${GCP_DNS_NAME:-}"
          domain_mapping_exists=false

          if [[ -n "${dns_name}" && "${dns_name}" != *. ]]; then
            dns_name="${dns_name}."
          fi

          if [[ "${service_account_input}" == *@* ]]; then
            service_account_email="${service_account_input}"
            service_account_id="${service_account_input%@*}"
          else
            service_account_id="${service_account_input}"
            service_account_email="${service_account_id}@${project_id}.iam.gserviceaccount.com"
          fi

          echo "Configuring GCP project '${project_id}'"

          if [[ -n "${links_domain}" ]]; then
            echo "Configuring Cloud DNS '${dns_name}' and mapping '${links_domain}' to '${cloud_run_service}' in '${region}'."
          fi

          echo "Reading project number..."
          project_number="$(gcloud projects describe "${project_id}" --format='value(projectNumber)')"

          echo "Enabling required APIs..."
          gcloud services enable \
            artifactregistry.googleapis.com \
            run.googleapis.com \
            storage.googleapis.com \
            iamcredentials.googleapis.com \
            dns.googleapis.com \
            secretmanager.googleapis.com \
            --project "${project_id}"

          echo "Ensuring Artifact Registry repository exists..."
          if ! gcloud artifacts repositories describe "${artifact_repository}" \
            --project "${project_id}" \
            --location "${region}" \
            >/dev/null 2>&1; then
            gcloud artifacts repositories create "${artifact_repository}" \
              --project "${project_id}" \
              --location "${region}" \
              --repository-format docker \
              --description "bcm links Cloud Run images"
          fi

          echo "Ensuring deployer service account exists..."
          if ! gcloud iam service-accounts describe "${service_account_email}" \
            --project "${project_id}" \
            >/dev/null 2>&1; then
            gcloud iam service-accounts create "${service_account_id}" \
              --project "${project_id}" \
              --display-name "bcm links Cloud Run deployer"
          fi

          echo "Granting deployer project roles..."
          for role in \
            roles/artifactregistry.admin \
            roles/run.developer \
            roles/storage.admin \
            roles/iam.serviceAccountUser; do
            gcloud projects add-iam-policy-binding "${project_id}" \
              --member "serviceAccount:${service_account_email}" \
              --role "${role}" \
              --condition=None \
              >/dev/null
          done

          echo "Ensuring Workload Identity pool exists..."
          if ! gcloud iam workload-identity-pools describe "${workload_pool}" \
            --project "${project_id}" \
            --location global \
            >/dev/null 2>&1; then
            gcloud iam workload-identity-pools create "${workload_pool}" \
              --project "${project_id}" \
              --location global \
              --display-name "bcm links GitHub"
          fi

          echo "Ensuring GitHub OIDC provider exists..."
          if ! gcloud iam workload-identity-pools providers describe "${workload_provider}" \
            --project "${project_id}" \
            --location global \
            --workload-identity-pool "${workload_pool}" \
            >/dev/null 2>&1; then
            gcloud iam workload-identity-pools providers create-oidc "${workload_provider}" \
              --project "${project_id}" \
              --location global \
              --workload-identity-pool "${workload_pool}" \
              --display-name "GitHub Actions" \
              --issuer-uri "https://token.actions.githubusercontent.com" \
              --attribute-mapping "google.subject=assertion.sub,attribute.actor=assertion.actor,attribute.repository=assertion.repository,attribute.repository_owner=assertion.repository_owner" \
              --attribute-condition "assertion.repository == '${github_repository}'"
          fi

          principal="principalSet://iam.googleapis.com/projects/${project_number}/locations/global/workloadIdentityPools/${workload_pool}/attribute.repository/${github_repository}"

          echo "Granting GitHub repository permission to impersonate deployer..."
          for role in \
            roles/iam.workloadIdentityUser \
            roles/iam.serviceAccountTokenCreator; do
            gcloud iam service-accounts add-iam-policy-binding "${service_account_email}" \
              --project "${project_id}" \
              --member "${principal}" \
              --role "${role}" \
              >/dev/null
          done

          if [[ -n "${links_domain}" ]]; then
            echo "Ensuring Cloud DNS public zone exists..."
            if ! gcloud dns managed-zones describe "${dns_zone}" \
              --project "${project_id}" \
              >/dev/null 2>&1; then
              gcloud dns managed-zones create "${dns_zone}" \
                --project "${project_id}" \
                --dns-name "${dns_name}" \
                --description "DNS zone for ${dns_name}"
            fi

            echo "Ensuring Cloud Run domain mapping exists..."
            if gcloud beta run domain-mappings describe \
              --project "${project_id}" \
              --region "${region}" \
              --domain "${links_domain}" \
              >/dev/null 2>&1; then
              domain_mapping_exists=true
            elif gcloud run services describe "${cloud_run_service}" \
              --project "${project_id}" \
              --region "${region}" \
              >/dev/null 2>&1; then
              gcloud beta run domain-mappings create \
                --project "${project_id}" \
                --region "${region}" \
                --service "${cloud_run_service}" \
                --domain "${links_domain}"
              domain_mapping_exists=true
            else
              echo "Skipping Cloud Run domain mapping because service '${cloud_run_service}' does not exist in '${region}' yet." >&2
              echo "Deploy the service with the links GitHub Actions workflow, then run this workflow again." >&2
            fi
          fi

          workload_identity_provider="projects/${project_number}/locations/global/workloadIdentityPools/${workload_pool}/providers/${workload_provider}"

          echo ''
          echo 'GCP setup completed.'
          echo ''
          echo 'Add or update the following GitHub Secrets:'
          echo "  - LINKS_GCP_ARTIFACT_REPOSITORY=${artifact_repository}"
          echo "  - LINKS_GCP_WORKLOAD_IDENTITY_PROVIDER=${workload_identity_provider}"
          echo "  - LINKS_GCP_SERVICE_ACCOUNT=${service_account_email}"
          echo ''
          echo 'Manually create or update the app env vars defined in ".links.sample.env" with suitable production values:'
          echo "  https://console.cloud.google.com/security/secret-manager?project=${project_id}"

          if [[ -n "${links_domain}" ]]; then
            echo ''
            echo "Delegate '${dns_name}' to these Cloud DNS name servers at your domain registrar:"
            gcloud dns record-sets list \
              --project "${project_id}" \
              --zone "${dns_zone}" \
              --name "${dns_name}" \
              --type NS \
              --format "value(rrdatas[])"

            echo ''
            echo "Verify domain ownership if not already done:"
            echo "  gcloud domains verify ${dns_name%.}"

            echo ''
            if [[ "${domain_mapping_exists}" == true ]]; then
              echo "Add these Cloud Run DNS records in Cloud DNS after delegation is active:"
              gcloud beta run domain-mappings describe \
                --project "${project_id}" \
                --region "${region}" \
                --domain "${links_domain}" \
                --format "table(resourceRecords[].name,resourceRecords[].type,resourceRecords[].rrdata)"
            else
              echo "Cloud Run DNS records are not available yet because the domain mapping was not created."
              echo "Deploy '${cloud_run_service}' to '${region}', then run this workflow again."
            fi
          fi
