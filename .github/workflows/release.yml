name: Release

on:
  # Allow manual trigger via GitHub Repo
  workflow_dispatch:
  # Automatically trigger on push of a release tag
  push:
    tags:
      - "[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9][0-9][0-9][0-9]"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DENO_DEPLOY_ORG: ${{ secrets.DENO_DEPLOY_ORG }}
  DENO_DEPLOY_PROJECT: ${{ secrets.DENO_DEPLOY_PROJECT }}
  DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set build artifact name
        id: artifact
        shell: bash
        run: echo "artifact-file-name=build-$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
      - name: Update script file attributes
        shell: bash
        run: chmod +x ./bin/*.sh
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Setup environment
        shell: bash
        run: deno task setup
      - name: Build site
        shell: bash
        run: deno task build
      - name: Upload build files
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.artifact-file-name }}
          overwrite: true
          include-hidden-files: true
          retention-days: 1
          compression-level: 9
          path: |
            _site/
            .env

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download build files
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.artifact.outputs.artifact-file-name }}
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Run tests
        shell: bash
        run: deno task test

  deploy:
    name: Deploy
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download build files
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.artifact.outputs.artifact-file-name }}
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Deploy to Deno Deploy
        run: |
          deno deploy \
            --org=$DENO_DEPLOY_ORG \
            --app=$DENO_DEPLOY_PROJECT \
            --token=$DENO_DEPLOY_TOKEN \
            --prod

  release:
    name: Release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate release notes
        run: bash 'bin/release-notes.sh' 'release-notes.log'
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          bodyFile: release-notes.log
          makeLatest: true
      - name: Cleanup
        run: rm release-notes.log
