#
#
# GitHub Actions Workflow: Links Deploy
#   - This workflow includes the publish, deploy, and release processes for Links
#   - Initial setup is required, refer to: src/links/README.md > Infrastructure
#
#

name: Links Deploy
run-name: Links Deploy by ${{ github.actor }} on ${{ github.ref_name }}

on:
  # Allow manual triggers via GitHub Repo > Actions
  workflow_dispatch:
    inputs:
      continue_deployment:
        description: 'Confirm production deployment for Links'
        type: boolean
        required: true
        default: false

defaults:
  run:
    working-directory: src/links
    shell: bash

permissions:
  contents: read

jobs:

  publish-gcp-images:
    name: Publish to GCP Artifact Registry
    if: ${{ inputs.continue_deployment == true }}
    runs-on: ubuntu-latest
    environment:
      name: gcp-cloud-run
      deployment: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.LINKS_GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.LINKS_GCP_SERVICE_ACCOUNT_JSON }}

      - name: Setup GCP CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.LINKS_GCP_REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.LINKS_GCP_SERVICE_ACCOUNT_JSON }}

      - name: Ensure Artifact Registry Repository
        run: |
          gcloud artifacts repositories describe "${{ secrets.LINKS_GCP_ARTIFACT_REPOSITORY }}" \
            --project "${{ secrets.LINKS_GCP_PROJECT_ID }}" \
            --location "${{ secrets.LINKS_GCP_REGION }}" \
            >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${{ secrets.LINKS_GCP_ARTIFACT_REPOSITORY }}" \
            --project "${{ secrets.LINKS_GCP_PROJECT_ID }}" \
            --location "${{ secrets.LINKS_GCP_REGION }}" \
            --repository-format docker \
            --description "bcm links Cloud Run images"

      - name: Push Images to Artifact Registry
        run: |
          TAG_PREFIX="${{ secrets.LINKS_GCP_REGION }}-docker.pkg.dev/${{ secrets.LINKS_GCP_PROJECT_ID }}/${{ secrets.LINKS_GCP_ARTIFACT_REPOSITORY }}/${{ secrets.LINKS_GCP_CLOUD_RUN_SERVICE_NAME }}"

          docker pull ghcr.io/karakeep-app/karakeep:release
          docker tag ghcr.io/karakeep-app/karakeep:release "${TAG_PREFIX}-web:latest"
          docker push "${TAG_PREFIX}-web:latest"

          docker pull gcr.io/zenika-hub/alpine-chrome:124
          docker tag gcr.io/zenika-hub/alpine-chrome:124 "${TAG_PREFIX}-browser:latest"
          docker push "${TAG_PREFIX}-browser:latest"

          docker pull getmeili/meilisearch:v1.41.0
          docker tag getmeili/meilisearch:v1.41.0 "${TAG_PREFIX}-search:latest"
          docker push "${TAG_PREFIX}-search:latest"

  deploy-gcp-cloud-run:
    name: Deploy to GCP Cloud Run
    needs: publish-gcp-images
    runs-on: ubuntu-latest
    environment:
      name: gcp-cloud-run
      deployment: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.LINKS_GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.LINKS_GCP_SERVICE_ACCOUNT_JSON }}

      - name: Setup GCP CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run via Compose
        run: |
          # Set environment variables for compose substitution
          export PROJECT_ID="${{ secrets.LINKS_GCP_PROJECT_ID }}"
          export REGION="${{ secrets.LINKS_GCP_REGION }}"
          export ARTIFACT_REPOSITORY="${{ secrets.LINKS_GCP_ARTIFACT_REPOSITORY }}"
          export SERVICE="${{ secrets.LINKS_GCP_CLOUD_RUN_SERVICE_NAME }}"
          export IMAGE_TAG="latest"

          # Inject application environment variables and secrets
          export OPENAI_API_KEY="${{ secrets.LINKS_OPENAI_API_KEY }}"
          export MEILI_MASTER_KEY="${{ secrets.LINKS_MEILI_MASTER_KEY }}"
          export NEXTAUTH_SECRET="${{ secrets.LINKS_NEXTAUTH_SECRET }}"
          export NEXTAUTH_URL="${{ secrets.LINKS_NEXTAUTH_URL }}"
          export INFERENCE_TEXT_MODEL="${{ secrets.LINKS_INFERENCE_TEXT_MODEL }}"
          export INFERENCE_IMAGE_MODEL="${{ secrets.LINKS_INFERENCE_IMAGE_MODEL }}"
          export DISABLE_SIGNUPS="${{ secrets.LINKS_DISABLE_SIGNUPS }}"
          export KARAKEEP_DISABLE_SIGNUPS="${{ secrets.LINKS_KARAKEEP_DISABLE_SIGNUPS }}"

          gcloud run compose up docker-compose.prod.yml \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --quiet
