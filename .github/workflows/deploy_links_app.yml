#
#
# Manual Workflow: Links - Deploy App build to GCP Cloud Run
#   - Initial setup steps and documentation in: 'src/links/.infra/README.md'
#
#

name: Links - Deploy App

on:
  # Allow manual triggers via GitHub Repo > Actions
  workflow_dispatch:
    inputs:
      continue_deployment:
        description: Confirm production deployment for Links
        type: boolean
        required: true
        default: false

defaults:
  run:
    working-directory: ./src/links
    shell: bash

env:
  PROJECT_ID: ${{ secrets.LINKS_GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE: ${{ secrets.LINKS_GCP_CLOUD_RUN_SERVICE_PREFIX }}
  ARTIFACT: ${{ secrets.LINKS_GCP_ARTIFACT_REPOSITORY }}
  AUTH_ID: ${{ secrets.LINKS_GCP_WORKLOAD_IDENTITY_PROVIDER }}
  AUTH_JSON: ${{ secrets.LINKS_GCP_APP_CREDENTIALS_JSON }}
  AUTH_EMAIL: ${{ secrets.LINKS_GCP_APP_CREDENTIALS_EMAIL }}

jobs:
  deploy_links_app:
    if: ${{ inputs.continue_deployment == true }}
    name: Links - Deploy App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Authenticate with GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          token_format: access_token
          workload_identity_provider: ${{ env.AUTH_ID }}
          credentials_json: ${{ env.AUTH_JSON }}
      - name: Setup GCP
        uses: google-github-actions/setup-gcloud@v3
      - name: Setup GCP Artifact Registry Repository
        run: |
          gcloud artifacts repositories describe "${{ env.ARTIFACT }}" \
            --project "${{ env.PROJECT_ID }}" \
            --location "${{ env.REGION }}" \
            >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${{ env.ARTIFACT }}" \
            --project "${{ env.PROJECT_ID }}" \
            --location "${{ env.REGION }}" \
            --description "${{ env.SERVICE }}" \
            --repository-format docker
      - name: Login to GCP Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Update Docker images
        run: |
          TAG_PREFIX="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT }}/${{ env.SERVICE }}"
          docker pull ghcr.io/karakeep-app/karakeep:release
          docker tag ghcr.io/karakeep-app/karakeep:release "${TAG_PREFIX}-web:latest"
          docker push "${TAG_PREFIX}-web:latest"
          docker pull gcr.io/zenika-hub/alpine-chrome:124
          docker tag gcr.io/zenika-hub/alpine-chrome:124 "${TAG_PREFIX}-browser:latest"
          docker push "${TAG_PREFIX}-browser:latest"
          docker pull getmeili/meilisearch:v1.41.0
          docker tag getmeili/meilisearch:v1.41.0 "${TAG_PREFIX}-search:latest"
          docker push "${TAG_PREFIX}-search:latest"
      - name: Deploy to GCP Cloud Run with Docker Compose
        run: |
          gcloud run compose up docker-compose.prod.yml \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --quiet
