#
#
# Manual Workflow: Site - Release and Deploy
#   - This workflow includes the test, release and deployment process for the site.
#   - Initial setup steps and documentation in: 'src/site/.infra/README.md'
#   - Requires GitHub Repository Secrets setup in Repo > Settings > Secrets > Actions.
#
#

name: Site - Release and Deploy

on:
  # Allow manual triggers via GitHub Repo > Actions > Release
  workflow_dispatch:
    inputs:
      continue_deployment:
        description: 'Confirm production deployment'
        type: boolean
        required: true
        default: false

permissions:
  contents: read

env:
  PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
  REGION: '${{ secrets.GCP_REGION }}'
  ARTIFACT_REPOSITORY: '${{ secrets.SITE_GCP_ARTIFACT_REPOSITORY }}'
  SITE_SERVICE: '${{ secrets.CLOUD_RUN_SITE_SERVICE }}'
  WORKLOAD_IDENTITY_PROVIDER: '${{ secrets.SITE_GCP_WORKLOAD_IDENTITY_PROVIDER }}'
  SERVICE_ACCOUNT: '${{ secrets.SITE_GCP_SERVICE_ACCOUNT }}'
  IMAGE_TAG: '${{ github.sha }}'

jobs:
  validate:
    name: Validate
    if: ${{ inputs.continue_deployment == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Update script file attributes
        shell: bash
        run: chmod +x ./bin/site/*.sh
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Setup environment
        working-directory: src/site
        shell: bash
        run: deno task setup
      - name: Build site
        working-directory: src/site
        shell: bash
        run: deno task build
      - name: Run tests
        working-directory: src/site
        shell: bash
        run: deno task test

  deploy:
    name: Deploy
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ env.SERVICE_ACCOUNT }}'
          project_id: '${{ env.PROJECT_ID }}'
          token_format: access_token
      - name: Set up GCP
        uses: google-github-actions/setup-gcloud@v2
      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          username: oauth2accesstoken
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev'
      - name: Create GCP Artifact Registry Repository
        shell: bash
        run: |-
          set -euo pipefail
          gcloud artifacts repositories describe "${ARTIFACT_REPOSITORY}" \
            --project "${PROJECT_ID}" \
            --location "${REGION}" \
            >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${ARTIFACT_REPOSITORY}" \
            --project "${PROJECT_ID}" \
            --location "${REGION}" \
            --repository-format docker \
            --description "bcm site Cloud Run images"
      - name: Build and Push Docker Image
        shell: bash
        run: |-
          set -euo pipefail
          image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SITE_SERVICE}:${IMAGE_TAG}"
          latest="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SITE_SERVICE}:latest"
          docker build --file src/site/Dockerfile --tag "$image" --tag "$latest" .
          docker push "$image"
          docker push "$latest"
      - name: Deploy to GCP Cloud Run
        shell: bash
        run: |-
          set -euo pipefail
          image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SITE_SERVICE}:${IMAGE_TAG}"
          gcloud run deploy "${SITE_SERVICE}" \
            --image "$image" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

  release:
    name: Release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set release tag name
        id: release
        shell: bash
        run: |
          DATE_RELEASE=$(TZ='Australia/Sydney' date +%Y%m%d.%H%M)
          echo "name=$DATE_RELEASE" >> $GITHUB_OUTPUT
          echo "tag=release-$DATE_RELEASE" >> $GITHUB_OUTPUT
      - name: Create release tag
        run: |
          git config user.name "bot-release"
          git config user.email "bcm+bot-release@murty.au"
          git tag ${{ steps.release.outputs.tag }}
          git push --tags --quiet
      - name: Generate release notes
        shell: bash
        run: |
          chmod +x ./bin/release/release-notes.sh
          ./bin/release/release-notes.sh release-notes.log
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ steps.release.outputs.name }}
          tag: ${{ steps.release.outputs.tag }}
          bodyFile: release-notes.log
          makeLatest: true
      - name: Cleanup
        run: |
          rm ./*.log
          rm -rf ./public
